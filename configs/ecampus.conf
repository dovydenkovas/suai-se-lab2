<VirtualHost *:80>

    DocumentRoot /var/www/ecampus
Header unset Content-Length
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    RewriteEngine On
    SetEnv DB_CONNECTION DB_CONNECTION_SECRET

    # Copy the incoming Authorization header into the CGI environment variable
    RewriteCond %{HTTP:Authorization} ^(.*)
    RewriteRule ^ - [E=HTTP_AUTHORIZATION:%1]

    Header always unset Access-Control-Allow-Origin
    Header always unset Access-Control-Allow-Methods
    Header always unset Access-Control-Allow-Headers

    Alias /cgi-bin/ /var/www/ecampus/cgi-bin/
    <Directory "/var/www/ecampus/cgi-bin">
        AllowOverride All
        Allow from all
        Order Allow,Deny

        Header always unset Access-Control-Allow-Origin
        Header always unset Access-Control-Allow-Methods
        Header always unset Access-Control-Allow-Headers

        Options +ExecCGI -MultiViews +SymLinksIfOwnerMatch
        AddHandler cgi-script .cgi .pl .out .exe
        Require all granted
    </Directory>


    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
