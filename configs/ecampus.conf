

<VirtualHost *:80>
    DocumentRoot /var/www/ecampus

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    Alias /cgi-bin/ /var/www/ecampus/cgi-bin/
    <Directory "/var/www/ecampus/cgi-bin">
        AllowOverride None
        Options +ExecCGI -MultiViews +SymLinksIfOwnerMatch
        AddHandler cgi-script .cgi .pl .out .exe
        Require all granted
    </Directory>


    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
